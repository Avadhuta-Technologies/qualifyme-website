  <text x="922" y="372" font-family="Arial Black, Arial, sans-serif" font-size="28" fill="#a78bfa" font-weight="900">88</text>
  <text x="954" y="372" font-family="Arial, sans-serif" font-size="14" fill="#475569">/100</text>
