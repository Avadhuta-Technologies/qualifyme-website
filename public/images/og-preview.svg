  <text x="682" y="492" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Sarah Kim matches 91% of job requirements.</text>
  <text x="682" y="507" font-family="Arial, sans-serif" font-size="11" fill="#64748b">Strong technical fit · Recommend for final round.</text>
