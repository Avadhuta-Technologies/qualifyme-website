  <text x="690" y="372" font-family="Arial Black, Arial, sans-serif" font-size="28" fill="#60a5fa" font-weight="900">94</text>
  <text x="722" y="372" font-family="Arial, sans-serif" font-size="14" fill="#475569">/100</text>
